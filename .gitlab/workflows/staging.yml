# Staging — build/deploy placeholders until staging infra is wired up.
# Trigger: manual jobs on pipelines for branch `main` (no tag).
# When ready: replace scripts with the same shape as production (compose build, push, deploy).

staging-build:
  stage: build
  tags: [Airmark, IL2, Rocky, Proxmox]
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null
      when: manual
  script:
    - echo "Staging build stub — not configured yet."
    - echo "Wire this job to your staging registry and compose stack when ready."

staging-deploy:
  stage: deploy
  needs: [staging-build]
  tags: [Airmark, IL2, Rocky, Proxmox]
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null
      when: manual
  script:
    - echo "Staging deploy stub — not configured yet."
